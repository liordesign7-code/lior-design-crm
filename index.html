<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>CRM ליאור דיזיין</title>
</head>

<body style="font-family:Arial; text-align:center; padding:40px;">

<h1>CRM מערכת</h1>

<input type="text" id="name" placeholder="שם" style="padding:10px; margin:5px;">
<input type="text" id="phone" placeholder="טלפון" style="padding:10px; margin:5px;">

<br><br>

<button onclick="addLead()" style="padding:10px 20px;">
הוסף ליד
</button>

<ul id="list"></ul>

<script>
function addLead() {
const name = document.getElementById('name').value;
const phone = document.getElementById('phone').value;

if (!name || !phone) {
alert('תמלא פרטים');
return;
}

const li = document.createElement('li');
li.innerText = name + ' - ' + phone;
document.getElementById('list').appendChild(li);
}
</script>

</body>
</html>
